services:
  postgres:
    image: postgres:15
    container_name: scraper-prod-postgres
    restart: always
    stop_grace_period: 30s
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: db
    expose:
      - "5432"
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d db"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: scraper-prod-redis
    restart: always
    stop_grace_period: 30s
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scraper-prod-backend
    restart: always
    stop_grace_period: 30s
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/db
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost"]'
      DEBUG: "false"
      RELOAD: "false"
      LOG_FORMAT: "text"
      REQUEST_TIMEOUT_SECONDS: "60"
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    command: ["sh", "/app/backend/scripts/wait_for_dependencies.sh", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-server-header"]

  nginx:
    image: nginx:1.27-alpine
    container_name: scraper-prod-nginx
    restart: always
    stop_grace_period: 30s
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  prod_postgres_data:
