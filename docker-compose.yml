services:
  postgres:
    image: postgres:15
    container_name: scraper-postgres
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: scraper
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scraper-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scraper-backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-server-header

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scraper-frontend
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      REACT_APP_API_URL: http://127.0.0.1:8001/api/v1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "127.0.0.1:43102:3000"
    command: npm start

volumes:
  postgres_data:
