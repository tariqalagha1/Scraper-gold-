name: main

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Lint
        run: |
          python - <<'PY'
          import pathlib
          import py_compile
          import sys

          roots = [pathlib.Path("backend/app"), pathlib.Path("backend/tests")]
          errors = []

          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob("*.py"):
                  try:
                      py_compile.compile(str(path), doraise=True)
                  except py_compile.PyCompileError as exc:
                      errors.append(f"{path}: {exc.msg}")

          if errors:
              print("\n".join(errors))
              sys.exit(1)
          PY

      - name: Run tests
        working-directory: backend
        run: |
          mkdir -p ../pytest-tmp ../pytest-cache
          pytest tests -q --basetemp ../pytest-tmp -o cache_dir=../pytest-cache

      - name: Build Docker image
        run: |
          docker build -t smart-scraper .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:ci

      - name: Build frontend
        run: npm run build:ci
