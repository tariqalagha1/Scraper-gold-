name: Quality Check

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Install Playwright dependencies
        run: |
          python -m playwright install chromium

      - name: Run backend lint and tests
        run: |
          python - <<'PY'
          import pathlib
          import py_compile
          import sys

          roots = [pathlib.Path('backend/app'), pathlib.Path('backend/tests')]
          errors = []

          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob('*.py'):
                  try:
                      py_compile.compile(str(path), doraise=True)
                  except py_compile.PyCompileError as exc:
                      errors.append(f"{path}: {exc.msg}")

          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          PY
          cd backend
          mkdir -p ../pytest-tmp ../pytest-cache
          pytest tests -q --basetemp ../pytest-tmp -o cache_dir=../pytest-cache

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm run test:ci

      - name: Build frontend for CI
        run: |
          cd frontend
          npm run build:ci
